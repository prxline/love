<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Love Tulips</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #fce4ec);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* SMOOTH SCROLL APP STYLE */
    .app {
      height: 100vh;
      height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .section {
      height: 100vh;
      height: 100dvh;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2em;
      color: #6d4c41;
      margin-bottom: 10px;
    }

    p {
      font-size: 1em;
      max-width: 90%;
      text-align: center;
      color: #5d4037;
    }

    /* IMAGE GRID */
    .image-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 100px;
      gap: 10px;
    }

    .img-box {
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      transition: transform 0.3s ease;
    }

    .img-box:active {
      transform: scale(0.95);
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .img-box:nth-child(1) { grid-column: span 2; grid-row: span 2; }
    .img-box:nth-child(2) { grid-row: span 2; }
    .img-box:nth-child(3) { grid-column: span 2; }

    /* FADE ANIMATION */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.2s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* TULIPS BACKGROUND */
    .tulip {
      position: fixed;
      bottom: -100px;
      width: 14px;
      height: 45px;
      background: #81c784;
      border-radius: 10px;
      animation: float 12s infinite ease-in;
      z-index: 0;
    }

    .tulip::before {
      content: '';
      position: absolute;
      top: -20px;
      left: -6px;
      width: 28px;
      height: 28px;
      background: #f48fb1;
      border-radius: 50% 50% 0 0;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-120vh); opacity: 0; }
    }

  </style>
</head>
<body>

<div class="app">

  <!-- SECTION 1 -->
  <div class="section">
    <div class="image-grid fade">
      <div class="img-box"><img src="https://picsum.photos/400/400?random=1"></div>
      <div class="img-box"><img src="https://picsum.photos/300/500?random=2"></div>
      <div class="img-box"><img src="https://picsum.photos/500/300?random=3"></div>
      <div class="img-box"><img src="https://picsum.photos/300/300?random=4"></div>
    </div>
  </div>

  <!-- SECTION 2 -->
  <div class="section">
    <h1 class="fade">Pour toi 💚</h1>
    <p class="fade">
      Comme une douce matinée matcha, ton amour apaise mon cœur.
      Tu es cette chaleur discrète, ce calme élégant.
      Avec toi, tout devient léger.
      Je t'aime infiniment.
    </p>
  </div>

</div>

<script>
  function createTulip() {
    const tulip = document.createElement('div');
    tulip.classList.add('tulip');
    tulip.style.left = Math.random() * window.innerWidth + 'px';
    tulip.style.animationDuration = (6 + Math.random() * 6) + 's';
    document.body.appendChild(tulip);

    setTimeout(() => tulip.remove(), 12000);
  }

  setInterval(createTulip, 700);
</script>

</body>
</html>
