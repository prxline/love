<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Love Tulips</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #e8f5e9, #fce4ec);
  overflow: hidden;
}

/* LOCK SCREEN */
.lock {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #e8f5e9, #fce4ec);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 0.6s ease;
}

.lock.hidden {
  opacity: 0;
  pointer-events: none;
}

.lock h1 {
  font-size: 2em;
  margin-bottom: 40px;
  color: #6d4c41;
}

/* SLIDER */
.slider {
  width: 80%;
  height: 50px;
  background: rgba(255,255,255,0.3);
  border-radius: 30px;
  position: relative;
  overflow: hidden;
}

.slider-text {
  position: absolute;
  width: 100%;
  text-align: center;
  line-height: 50px;
  color: #5d4037;
  font-size: 0.9em;
}

.slider-btn {
  position: absolute;
  top: 5px;
  left: 5px;
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}

/* APP */
.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.section {
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
}

h2 {
  font-family: 'Playfair Display', serif;
  color: #6d4c41;
}

p {
  text-align: center;
  color: #5d4037;
}

.image-grid {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: 100px;
  gap: 10px;
}

.img-box {
  border-radius: 16px;
  overflow: hidden;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.img-box:nth-child(1) { grid-column: span 2; grid-row: span 2; }
.img-box:nth-child(2) { grid-row: span 2; }
.img-box:nth-child(3) { grid-column: span 2; grid-row: span 2; }

/* TULIPS */
.tulip {
  position: fixed;
  bottom: -100px;
  width: 14px;
  height: 45px;
  background: #81c784;
  border-radius: 10px;
  animation: float 12s infinite ease-in;
}

.tulip::before {
  content: '';
  position: absolute;
  top: -20px;
  left: -6px;
  width: 28px;
  height: 28px;
  background: #f48fb1;
  border-radius: 50% 50% 0 0;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div class="lock" id="lock">
  <h1>💚</h1>
  <div class="slider" id="slider">
    <div class="slider-text">glisse pour ouvrir →</div>
    <div class="slider-btn" id="btn"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="section">
    <div class="image-grid">
      <div class="img-box"><img src="IMG_7613.jpg"></div>
      <div class="img-box"><img src="IMG_7611.jpg"></div>
      <div class="img-box"><img src="IMG_7610.jpg"></div>
      <div class="img-box"><img src="IMG_7612.jpg"></div>
    </div>
  </div>

  <div class="section">
    <h2>Pour toi 💚</h2>
    <p>
      Comme une douce matinée matcha, ton amour apaise mon cœur.
      Tu es cette chaleur discrète.
      Je t'aime infiniment.
    </p>
  </div>
</div>

<script>
const btn = document.getElementById('btn');
const lock = document.getElementById('lock');
let startX = 0;

btn.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

btn.addEventListener('touchmove', e => {
  let move = e.touches[0].clientX - startX;
  if (move > 0 && move < 250) {
    btn.style.transform = `translateX(${move}px)`;
  }

  if (move > 180) {
    unlock();
  }
});

function unlock() {
  lock.classList.add('hidden');
  if (navigator.vibrate) navigator.vibrate(20);
}

/* TULIPS */
function createTulip() {
  const tulip = document.createElement('div');
  tulip.classList.add('tulip');
  tulip.style.left = Math.random() * window.innerWidth + 'px';
  document.body.appendChild(tulip);
  setTimeout(() => tulip.remove(), 12000);
}

setInterval(createTulip, 800);
</script>

</body>
</html>
