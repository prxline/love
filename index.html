<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Tulips</title>

  <!-- GitHub Pages friendly (no external restrictions except fonts) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #fce4ec);
      overflow-x: hidden;
    }

    .container {
      min-height: 100vh;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-direction: column;
      text-align: center;
      color: #4a4a4a;
      position: relative;
      z-index: 2;
      padding-bottom: 80px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3em;
      margin-bottom: 10px;
      color: #6d4c41;
    }

    p {
      max-width: 600px;
      font-size: 1.2em;
      line-height: 1.6;
      color: #5d4037;
      padding: 0 20px;
    }

    /* IMAGE GRID */
    .image-grid {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      height: 90%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 120px;
      gap: 15px;
      z-index: 1;
    }

    .img-box {
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
      transition: transform 0.4s ease;
    }

    .img-box:hover {
      transform: scale(1.05);
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* TULIPS */
    .tulip {
      position: fixed;
      bottom: -100px;
      width: 20px;
      height: 60px;
      background: #81c784;
      border-radius: 10px;
      animation: float 10s infinite ease-in;
      z-index: 0;
    }

    .tulip::before {
      content: '';
      position: absolute;
      top: -30px;
      left: -10px;
      width: 40px;
      height: 40px;
      background: #f48fb1;
      border-radius: 50% 50% 0 0;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!--
INSTRUCTIONS GITHUB PAGES:
1. Renomme ce fichier en index.html
2. Upload dans un repo GitHub
3. Active GitHub Pages (Settings > Pages)
4. Remplace les images ci-dessous par tes propres photos (ex: images/1.jpg)
-->

<div class="image-grid">
  <div class="img-box" style="grid-column: span 2; grid-row: span 2;">
    <img src="IMG_7610.jpg">
  </div>
  <div class="img-box" style="grid-column: span 1; grid-row: span 2;">
    <img src="IMG_7611.jpg">
  </div>
  <div class="img-box" style="grid-column: span 2; grid-row: span 1;">
    <img src="IMG_7613.jpg">
  </div>
  <div class="img-box" style="grid-column: span 1; grid-row: span 1;">
    <img src="IMG_7612.jpg">
  </div>
</div>

<div class="container">
  <h1>Pour toi 💚</h1>
  <p>
    Comme une douce matinée matcha, ton amour apaise mon cœur.
    
    Tu es cette chaleur discrète, ce calme élégant, cette beauté simple
    qui rend chaque instant plus doux.

    Avec toi, tout devient léger, comme des tulipes dans le vent.

    Je t'aime, simplement… mais infiniment.
  </p>
</div>

<script>
  function createTulip() {
    const tulip = document.createElement('div');
    tulip.classList.add('tulip');
    tulip.style.left = Math.random() * window.innerWidth + 'px';
    tulip.style.animationDuration = (5 + Math.random() * 5) + 's';
    document.body.appendChild(tulip);

    setTimeout(() => {
      tulip.remove();
    }, 10000);
  }

  setInterval(createTulip, 500);
</script>

</body>
</html>
