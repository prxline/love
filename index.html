<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Love Tulips</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #fce4ec);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      min-height: 100vh;
      min-height: 100dvh; /* iPhone Safari fix */
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-direction: column;
      text-align: center;
      color: #4a4a4a;
      position: relative;
      z-index: 2;
      padding: 0 20px calc(80px + env(safe-area-inset-bottom));
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2em;
      margin-bottom: 10px;
      color: #6d4c41;
    }

    p {
      max-width: 90%;
      font-size: 1em;
      line-height: 1.5;
      color: #5d4037;
    }

    /* IMAGE GRID MOBILE OPTIMIZED */
    .image-grid {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 95%;
      height: 60%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 100px;
      gap: 10px;
      z-index: 1;
    }

    .img-box {
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      transition: transform 0.3s ease;
    }

    .img-box:active {
      transform: scale(0.97);
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* GRID VARIATION */
    .img-box:nth-child(1) { grid-column: span 2; grid-row: span 2; }
    .img-box:nth-child(2) { grid-row: span 2; }
    .img-box:nth-child(3) { grid-column: span 2; }

    /* TULIPS */
    .tulip {
      position: fixed;
      bottom: -100px;
      width: 16px;
      height: 50px;
      background: #81c784;
      border-radius: 10px;
      animation: float 10s infinite ease-in;
      z-index: 0;
    }

    .tulip::before {
      content: '';
      position: absolute;
      top: -25px;
      left: -8px;
      width: 32px;
      height: 32px;
      background: #f48fb1;
      border-radius: 50% 50% 0 0;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="image-grid">
  <div class="img-box" style="grid-column: span 2; grid-row: span 2;">
    <img src="IMG_7610.jpg">
  </div>
  <div class="img-box" style="grid-column: span 1; grid-row: span 2;">
    <img src="IMG_7611.jpg">
  </div>
  <div class="img-box" style="grid-column: span 2; grid-row: span 1;">
    <img src="IMG_7613.jpg">
  </div>
  <div class="img-box" style="grid-column: span 1; grid-row: span 1;">
    <img src="IMG_7612.jpg">
  </div>
</div>

<div class="container">
  <h1>Pour toi 💚</h1>
  <p>
    Comme une douce matinée matcha, ton amour apaise mon cœur.
    
    Tu es cette chaleur discrète, ce calme élégant, cette beauté simple
    qui rend chaque instant plus doux.

    Avec toi, tout devient léger, comme des tulipes dans le vent.

    Je t'aime, simplement… mais infiniment.
  </p>
</div>

<script>
  function createTulip() {
    const tulip = document.createElement('div');
    tulip.classList.add('tulip');
    tulip.style.left = Math.random() * window.innerWidth + 'px';
    tulip.style.animationDuration = (5 + Math.random() * 5) + 's';
    document.body.appendChild(tulip);

    setTimeout(() => {
      tulip.remove();
    }, 10000);
  }

  setInterval(createTulip, 600);
</script>

</body>
</html>
